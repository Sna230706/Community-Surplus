<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Surplus | Profile</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9e1ec;
      --brand: #178f6d;
      --brand-dark: #0f6f55;
      --accent: #f2a541;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      max-width: 1100px;
      margin: 0 auto;
      min-height: 70px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      font-weight: 800;
      color: var(--brand-dark);
      text-decoration: none;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
      font-weight: 900;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .links a {
      padding: 9px 12px;
      border-radius: 7px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .links a.active,
    .links a:hover {
      background: #e7f6f1;
      color: var(--brand-dark);
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .profile-card {
      text-align: center;
    }

    .avatar {
      width: 118px;
      height: 118px;
      border-radius: 50%;
      margin: 0 auto 14px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: #fff;
      font-size: 42px;
      font-weight: 900;
    }

    h1,
    h2 {
      margin: 0 0 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 10px;
      background: #fbfcfe;
    }

    .stat strong {
      display: block;
      color: var(--brand-dark);
      font-size: 24px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 104px;
      resize: vertical;
    }

    .wide { grid-column: 1 / -1; }

    .btn {
      border: 0;
      border-radius: 7px;
      padding: 11px 14px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
    }

    .btn.secondary {
      background: #eef2f7;
      color: var(--text);
    }

    .message {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 7px;
      background: #e7f6f1;
      color: var(--brand-dark);
      font-weight: 800;
    }

    @media (max-width: 820px) {
      .layout,
      form {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .links,
      .btn {
        width: 100%;
      }

      .links a {
        flex: 1;
        text-align: center;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="dashboard.html"><span class="brand-mark">CS</span> Community Surplus</a>
      <div class="links">
        <a href="dashboard.html">Dashboard</a>
        <a href="my_products.html">My Products</a>
        <a class="active" href="profile.html">Profile</a>
        <a href="edit_products.html">Add Product</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="layout">
      <aside class="panel profile-card">
        <div class="avatar" id="avatar">S</div>
        <h1 id="displayName">Sreenidhi</h1>
        <p id="displayRole">Buyer and Seller</p>
        <p id="displayLocation">Kochi</p>
        <div class="stats">
          <div class="stat"><strong id="listedCount">0</strong><span>Listed</span></div>
          <div class="stat"><strong id="soldCount">0</strong><span>Sold</span></div>
          <div class="stat"><strong id="wishCount">0</strong><span>Wishlist</span></div>
        </div>
      </aside>

      <section class="panel">
        <h2>Profile Management</h2>
        <p>Update account details used for selling, buying, and contact information.</p>
        <form id="profileForm">
          <label>Full Name
            <input id="name" required>
          </label>
          <label>Email
            <input id="email" type="email" required>
          </label>
          <label>Phone Number
            <input id="phone" required>
          </label>
          <label>Location
            <input id="location" required>
          </label>
          <label>Account Role
            <select id="role">
              <option>Buyer and Seller</option>
              <option>Buyer</option>
              <option>Seller</option>
            </select>
          </label>
          <label>Verified Account
            <select id="verified">
              <option>Verified</option>
              <option>Not Verified</option>
            </select>
          </label>
          <label class="wide">About
            <textarea id="about"></textarea>
          </label>
          <div class="wide">
            <button class="btn" type="submit">Save Profile</button>
            <a class="btn secondary" href="dashboard.html">Back to Dashboard</a>
            <div class="message" id="message">Profile saved successfully.</div>
          </div>
        </form>
      </section>
    </section>
  </main>

  <script>
    const defaultProfile = {
      name: "Sreenidhi",
      email: "sreenidhi@example.com",
      phone: "9876543210",
      location: "Kochi",
      role: "Buyer and Seller",
      verified: "Verified",
      about: "Community member interested in reusing books, furniture, and electronics."
    };

    function getProfile() {
      const saved = localStorage.getItem("communityProfile");
      if (saved) return JSON.parse(saved);
      localStorage.setItem("communityProfile", JSON.stringify(defaultProfile));
      return defaultProfile;
    }

    function getProducts() {
      return JSON.parse(localStorage.getItem("communityProducts") || "[]");
    }

    function fillProfile() {
      const profile = getProfile();
      Object.keys(defaultProfile).forEach(key => {
        document.getElementById(key).value = profile[key] || "";
      });

      document.getElementById("avatar").textContent = (profile.name || "U").trim().charAt(0).toUpperCase();
      document.getElementById("displayName").textContent = profile.name;
      document.getElementById("displayRole").textContent = profile.role + " | " + profile.verified;
      document.getElementById("displayLocation").textContent = profile.location;

      const products = getProducts();
      const wishlist = JSON.parse(localStorage.getItem("communityWishlist") || "[]");
      document.getElementById("listedCount").textContent = products.length;
      document.getElementById("soldCount").textContent = products.filter(product => product.availability === "Sold Out").length;
      document.getElementById("wishCount").textContent = wishlist.length;
    }

    document.getElementById("profileForm").addEventListener("submit", event => {
      event.preventDefault();
      const profile = {};
      Object.keys(defaultProfile).forEach(key => {
        profile[key] = document.getElementById(key).value.trim();
      });
      localStorage.setItem("communityProfile", JSON.stringify(profile));
      fillProfile();
      const message = document.getElementById("message");
      message.style.display = "block";
      setTimeout(() => message.style.display = "none", 2200);
    });

    fillProfile();
  </script>
</body>
</html>
