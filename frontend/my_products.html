<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Surplus | My Products</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #d9e1ec;
      --brand: #178f6d;
      --brand-dark: #0f6f55;
      --accent: #f2a541;
      --danger: #dc2626;
      --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      max-width: 1180px;
      margin: 0 auto;
      min-height: 70px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      font-weight: 800;
      color: var(--brand-dark);
      text-decoration: none;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--brand);
      font-weight: 900;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .links a {
      padding: 9px 12px;
      border-radius: 7px;
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .links a.active,
    .links a:hover {
      background: #e7f6f1;
      color: var(--brand-dark);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .panel,
    .product {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .stat strong {
      display: block;
      color: var(--brand-dark);
      font-size: 28px;
    }

    .stat span {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 190px;
      gap: 12px;
      margin-bottom: 18px;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .product {
      display: grid;
      grid-template-columns: 170px 1fr auto;
      gap: 16px;
      padding: 14px;
      align-items: center;
    }

    .product img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 7px;
      background: #e5e7eb;
    }

    .product h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .meta {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .price {
      margin-top: 8px;
      font-weight: 900;
      color: var(--brand-dark);
      font-size: 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      width: fit-content;
      border-radius: 999px;
      padding: 5px 10px;
      background: #e7f6f1;
      color: var(--brand-dark);
      font-size: 12px;
      font-weight: 800;
    }

    .badge.sold { background: #fee2e2; color: var(--danger); }
    .badge.reserved { background: #fff4db; color: #925d00; }

    .actions {
      display: grid;
      gap: 8px;
      min-width: 130px;
    }

    .btn {
      border: 0;
      border-radius: 7px;
      padding: 10px 12px;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 40px;
    }

    .btn.secondary {
      background: #eef2f7;
      color: var(--text);
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
    }

    .empty {
      padding: 34px;
      text-align: center;
      color: var(--muted);
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: 8px;
    }

    @media (max-width: 860px) {
      .summary,
      .toolbar,
      .product {
        grid-template-columns: 1fr;
      }

      .product img {
        max-height: 260px;
      }

      .actions {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 620px) {
      .nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .links,
      .btn {
        width: 100%;
      }

      .links a {
        flex: 1;
        text-align: center;
      }

      .summary,
      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="dashboard.html"><span class="brand-mark">CS</span> Community Surplus</a>
      <div class="links">
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="my_products.html">My Products</a>
        <a href="profile.html">Profile</a>
        <a href="edit_products.html">Add Product</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="panel">
      <div>
        <h1>My Products</h1>
        <p>Manage uploaded products, update availability, edit details, or remove listings.</p>
      </div>
      <a class="btn" href="edit_products.html">Add Product</a>
    </section>

    <section class="summary">
      <div class="stat"><strong id="totalCount">0</strong><span>Total</span></div>
      <div class="stat"><strong id="availableCount">0</strong><span>Available</span></div>
      <div class="stat"><strong id="reservedCount">0</strong><span>Reserved</span></div>
      <div class="stat"><strong id="soldCount">0</strong><span>Sold Out</span></div>
    </section>

    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Search your product listings">
      <select id="statusFilter">
        <option value="">All status</option>
        <option>Available</option>
        <option>Reserved</option>
        <option>Sold Out</option>
      </select>
    </section>

    <section class="list" id="productList"></section>
  </main>

  <script>
    const defaultProducts = [
      {
        id: "p1",
        name: "Study Table",
        category: "Furniture",
        condition: "Good",
        availability: "Available",
        mrp: 3500,
        price: 1800,
        location: "Kochi",
        contact: "9876543210",
        seller: "Sreenidhi",
        description: "Strong wooden table suitable for students.",
        image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&w=900&q=80",
        type: "Sale"
      },
      {
        id: "p2",
        name: "Engineering Books Set",
        category: "Books",
        condition: "Used",
        availability: "Available",
        mrp: 2200,
        price: 650,
        location: "Thrissur",
        contact: "9847001122",
        seller: "Anu",
        description: "Semester reference books in readable condition.",
        image: "https://images.unsplash.com/photo-1512820790803-83ca734da794?auto=format&fit=crop&w=900&q=80",
        type: "Sale"
      }
    ];

    function getProducts() {
      const saved = localStorage.getItem("communityProducts");
      if (saved) return JSON.parse(saved);
      localStorage.setItem("communityProducts", JSON.stringify(defaultProducts));
      return defaultProducts;
    }

    function saveProducts(products) {
      localStorage.setItem("communityProducts", JSON.stringify(products));
    }

    let products = getProducts();
    const list = document.getElementById("productList");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");

    function money(value) {
      return Number(value) === 0 ? "Free" : "Rs. " + Number(value).toLocaleString("en-IN");
    }

    function renderStats() {
      document.getElementById("totalCount").textContent = products.length;
      document.getElementById("availableCount").textContent = products.filter(product => product.availability === "Available").length;
      document.getElementById("reservedCount").textContent = products.filter(product => product.availability === "Reserved").length;
      document.getElementById("soldCount").textContent = products.filter(product => product.availability === "Sold Out").length;
    }

    function filteredProducts() {
      const query = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      return products.filter(product => {
        const matchesQuery = !query || [product.name, product.category, product.location, product.description].join(" ").toLowerCase().includes(query);
        const matchesStatus = !status || product.availability === status;
        return matchesQuery && matchesStatus;
      });
    }

    function updateStatus(id, availability) {
      products = products.map(product => product.id === id ? { ...product, availability } : product);
      saveProducts(products);
      render();
    }

    function deleteProduct(id) {
      if (!confirm("Delete this product listing?")) return;
      products = products.filter(product => product.id !== id);
      saveProducts(products);
      render();
    }

    function render() {
      renderStats();
      const visible = filteredProducts();
      if (!visible.length) {
        list.innerHTML = '<div class="empty">No products found. Add a new product to start selling.</div>';
        return;
      }

      list.innerHTML = visible.map(product => {
        const statusClass = product.availability === "Sold Out" ? "sold" : product.availability === "Reserved" ? "reserved" : "";
        return `
          <article class="product">
            <img src="${product.image}" alt="${product.name}">
            <div>
              <span class="badge ${statusClass}">${product.availability}</span>
              <h2>${product.name}</h2>
              <div class="meta">${product.category} • ${product.condition} • ${product.location}</div>
              <div class="meta">${product.description}</div>
              <div class="price">${money(product.price)} <span class="meta">MRP ${money(product.mrp)}</span></div>
              <div class="meta">Contact: ${product.contact} | Type: ${product.type}</div>
            </div>
            <div class="actions">
              <a class="btn" href="edit_products.html?id=${product.id}">Edit</a>
              <button class="btn secondary" onclick="updateStatus('${product.id}', 'Reserved')">Reserve</button>
              <button class="btn secondary" onclick="updateStatus('${product.id}', 'Sold Out')">Sold</button>
              <button class="btn danger" onclick="deleteProduct('${product.id}')">Delete</button>
            </div>
          </article>
        `;
      }).join("");
    }

    [searchInput, statusFilter].forEach(control => {
      control.addEventListener("input", render);
      control.addEventListener("change", render);
    });

    render();
  </script>
</body>
</html>
